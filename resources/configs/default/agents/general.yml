version: 2.2.1
name: general
description: "Ascend NPU profiling analysis agent with msprof-mcp-first workflow"
prompt:
  - prompts/agents/general.md
llm: default
checkpointer: sqlite
default: true
recursion_limit: 80
tools:
  patterns:
    - impl:file_system:read_file
    - impl:file_system:ls
    - impl:file_system:glob
    - impl:grep_search:*
    - internal:*:*
    - mcp:*:*
  use_catalog: false
  output_max_tokens: 10000
subagents:
  - general-purpose
  - explorer
skills:
  patterns:
    - "*:*"
  use_catalog: false
compression:
  auto_compress_enabled: true
  auto_compress_threshold: 0.8
  llm: default
  prompt:
    - prompts/shared/general_compression.md
